<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTaxi - Access Console</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav class="navbar" id="main-nav"></nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 3rem 0;">
        <div class="glass-container modal-content" style="width: 100%; max-width: 450px;">
            <h2 style="font-size: 2.2rem; font-weight: 800; text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Welcome Back</h2>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="role">Access Level</label>
                    <select id="role" class="form-control" required>
                        <option value="customer">Customer / Passenger</option>
                        <option value="driver">Driver Partner</option>
                        <option value="admin">Platform Administrator</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">Registered Email</label>
                    <input type="email" id="email" class="form-control" placeholder="e.g. name@domain.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password / Credentials</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <small style="color: var(--text-muted); font-size: 0.8rem; margin-top: 0.2rem;">Note: For drivers, default login password is phone number.</small>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; padding: 0.9rem;">
                    Sign In to Console
                </button>
            </form>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem;">
                <span style="color: var(--text-muted);">New to GoTaxi?</span> 
                <a href="register.html" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 0.5rem;">Register Here</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
