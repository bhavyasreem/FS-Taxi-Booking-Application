<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoTaxi - Join the Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh;">
    <nav class="navbar" id="main-nav"></nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 4rem 0;">
        <div class="glass-container modal-content" style="width: 100%; max-width: 550px;">
            <h2 style="font-size: 2.2rem; font-weight: 800; text-align: center; margin-bottom: 2rem; background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Register Account</h2>
            
            <form id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="reg-role">I want to register as a:</label>
                    <select id="reg-role" class="form-control" required>
                        <option value="customer">Customer / Passenger</option>
                        <option value="driver">Driver Partner</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="e.g. Rahul Sharma" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="e.g. name@domain.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-phone">Phone Number</label>
                    <input type="text" id="reg-phone" class="form-control" placeholder="10-digit number" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="••••••••" required>
                </div>

                <!-- Customer-only Fields -->
                <div id="customer-only-fields">
                    <div class="form-group">
                        <label class="form-label" for="reg-address">Residential Address</label>
                        <input type="text" id="reg-address" class="form-control" placeholder="e.g. Hyderabad" required>
                    </div>
                </div>

                <!-- Driver-only Fields (Initially hidden) -->
                <div id="driver-only-fields" style="display: none; border-top: 1px solid var(--border-color); margin-top: 1.5rem; padding-top: 1.5rem;">
                    <h3 style="font-size: 1.25rem; font-weight: 700; margin-bottom: 1rem; color: var(--accent);">Professional & Vehicle Details</h3>
                    
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label" for="reg-license">License Number</label>
                            <input type="text" id="reg-license" class="form-control" placeholder="e.g. DL123456789">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="reg-experience">Experience (Years)</label>
                            <input type="number" id="reg-experience" class="form-control" placeholder="e.g. 5" min="0">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label" for="reg-vehicle-model">Vehicle Model</label>
                            <input type="text" id="reg-vehicle-model" class="form-control" placeholder="e.g. Hyundai Verna">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="reg-vehicle-no">Vehicle Number</label>
                            <input type="text" id="reg-vehicle-no" class="form-control" placeholder="e.g. TS09AB1234">
                        </div>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="form-group">
                            <label class="form-label" for="reg-vehicle-type">Vehicle Type</label>
                            <select id="reg-vehicle-type" class="form-control">
                                <option value="Sedan">Sedan</option>
                                <option value="Hatchback">Hatchback</option>
                                <option value="SUV">SUV</option>
                                <option value="Auto">Auto</option>
                                <option value="Bike">Bike</option>
                                <option value="Luxury">Luxury</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="reg-vehicle-capacity">Seating Capacity</label>
                            <input type="number" id="reg-vehicle-capacity" class="form-control" placeholder="e.g. 4" min="1">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1.5rem; padding: 0.9rem;">
                    Create Account
                </button>
            </form>

            <div style="margin-top: 2rem; text-align: center; font-size: 0.95rem;">
                <span style="color: var(--text-muted);">Already have an account?</span> 
                <a href="login.html" style="color: var(--primary); font-weight: 600; text-decoration: none; margin-left: 0.5rem;">Login Here</a>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
